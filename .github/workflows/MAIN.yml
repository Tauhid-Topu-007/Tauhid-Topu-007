# GitHub Action for generating a contribution graph with a snake eating your contributions.

name: Generate Snake

# Runs every 6 hours
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - uses: actions/checkout@v2

      # Generate the snake GIF and SVG
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: Tauhid-Topu-007
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Show git status for debugging
      - run: git status

      # Push generated files to master branch using PAT
      - name: Push changes to master
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.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 }}  # Make sure you create this secret in your repo
          branch: master
          force: true

      # Optional: Publish files to GitHub Pages (output branch)
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.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}}  # Use the same PAT secret
